name: earthquest
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Offline-first database (community fork with AGP-8+ namespace fix)
  isar_community: ^3.3.1
  isar_community_flutter_libs: ^3.3.1
  path_provider: ^2.1.4

  # Reactive state management
  flutter_riverpod: ^2.6.1

  # Lottie animations
  lottie: ^3.3.2

  # Beautiful entry animations
  flutter_animate: ^4.5.2

  # Sharing progress photos
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation for Isar schemas
  isar_community_generator: ^3.3.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
